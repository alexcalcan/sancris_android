name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk \
             out/sancris-cititor-${{ github.sha }}.apk
          cp app/build/outputs/apk/debug/app-debug.apk \
             out/sancris-cititor-latest.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sancris-cititor-apk
          path: out/sancris-cititor-${{ github.sha }}.apk

      - name: Update "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (auto)
          body: |
            APK auto-construit din ultimul commit pe `main`.
            Commit: ${{ github.sha }}
          files: out/sancris-cititor-latest.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
